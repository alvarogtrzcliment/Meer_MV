<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Tweet-Clon</title>
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>
  <body>
    <div
      class="tweet"
      id="id-tweet"
    >
      <div class="encabezado">
        <img
          id="foto-perfil"
          src="https://placehold.co/100x100"
          alt=""
        />

        <div class="texto-usuario">
          <h2>Nombre de usuario</h2>
          <h3>@Usuario</h3>
        </div>

        <img
          id="boton-opciones"
          src="https://www.svgrepo.com/show/493938/more-unfold.svg"
          alt=""
        />
      </div>

      <p id="contenido-tweet">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Itaque tempore
        dolorum similique, repellat odit reprehenderit ea optio tenetur maiores
        quis, excepturi laborum amet quas corrupti velit natus! Iusto,
        dignissimos cumque!
      </p>

      <p id="fecha">5:39PM - 04/02</p>

      <div class="texto-interacciones">
        <p>53K Likes</p>
        <p>200K Retweets</p>
      </div>

      <div class="iconos-interaccion">
        <a href="">
          <img
            src="https://www.svgrepo.com/show/522073/comment-5.svg"
            alt=""
          />
        </a>
        <a href="">
          <img
            src="https://www.svgrepo.com/show/522073/comment-5.svg"
            alt=""
          />
        </a>
        <a href="">
          <img
            src="https://www.svgrepo.com/show/522073/comment-5.svg"
            alt=""
          />
        </a>
        <a href="">
          <img
            src="https://www.svgrepo.com/show/522073/comment-5.svg"
            alt=""
          />
        </a>
      </div>
    </div>
  </body>
</html>
