<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Heatmap Renderer</title>
    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script
      type="module"
      src="https://js.arcgis.com/5.0/"
    ></script>
    <script
      type="module"
      src="main.js"
      defer
    ></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <arcgis-map basemap="dark-gray">
      <arcgis-legend slot="bottom-right"></arcgis-legend>
    </arcgis-map>
  </body>
</html>
