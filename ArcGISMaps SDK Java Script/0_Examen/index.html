<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Examen María Perdomo</title>

  <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }
  </style>

  <script type="module" src="./main.js" defer></script>

</head>

<body class="calcite-mode-dark">

  <arcgis-map basemap="dark-gray-vector" , center="-3.7038, 40.4168" , zoom="12">
    <arcgis-popup slot="popup"></arcgis-popup>
    <arcgis-layer-list id="listaCapas" slot="bottom-left"></arcgis-layer-list>
    <arcgis-legend id="leyenda" slot="bottom-right"></arcgis-legend>
  </arcgis-map>
</body>

</html>
