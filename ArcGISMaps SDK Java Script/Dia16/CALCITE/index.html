<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcite</title>

    <!-- Load the ArcGIS Maps SDK for JavaScript from CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }
    </style>

    <script type="module" src="./main.js" defer></script>

</head>

<body>
<!-- METETE EN LA DOCUMENTACIÓN Y COPIAS LO QUE QUIERES -->
    <calcite-shell-panel slot="panel-start" position="start" id="shell-panel-start">
        <calcite-action-bar slot="action-bar">
            <calcite-action-group>
                <calcite-action text="Add" icon="plus" text-enabled></calcite-action>
                <calcite-action active text="Layers" indicator icon="layers" text-enabled></calcite-action>
            </calcite-action-group>
            <calcite-action-group>
                <calcite-action text="Undo" icon="undo" text-enabled></calcite-action>
                <calcite-action text="Redo" indicator icon="redo" text-enabled></calcite-action>
                <calcite-action text="Save" disabled icon="save" text-enabled></calcite-action>
            </calcite-action-group>
            <calcite-action-group slot="bottom-actions">
                <calcite-action text="Tips" icon="question" text-enabled></calcite-action>
                <calcite-action text="Settings" indicator icon="gear" text-enabled></calcite-action>
            </calcite-action-group>
        </calcite-action-bar>
        <calcite-panel heading="Layers" id="panel-start" closable>
            <calcite-block collapsible heading="Symbology" description="Select type, color, and transparency"
                icon-start="map-pin">
                <calcite-notice open>
                    <div slot="message">The viewers are going to love this</div>
                </calcite-notice>
            </calcite-block>
        </calcite-panel>
    </calcite-shell-panel>

    </arcgis-map>
</body>

</html>
